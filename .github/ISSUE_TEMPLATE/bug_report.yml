name: Bug report
description: Something isn't working with the add-on
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report! The **Logs** and **Validate streams** output are the most
        useful things you can include. Please redact any passwords, domains, or tokens.
  - type: input
    id: addon-version
    attributes:
      label: Add-on version
      description: Shown on the add-on's Info page (e.g. 1.4.19).
      placeholder: "1.4.19"
    validations:
      required: true
  - type: dropdown
    id: install-type
    attributes:
      label: Home Assistant install type
      options:
        - Home Assistant OS
        - Home Assistant Supervised
        - Other / not sure
    validations:
      required: true
  - type: input
    id: camera
    attributes:
      label: Camera make / model (and stream/codec if known)
      placeholder: "Amcrest IP5M, sub-stream, H.264 Baseline"
  - type: dropdown
    id: mode
    attributes:
      label: Which mode is the affected camera set to?
      options:
        - copy
        - transcode
        - not sure
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect, and what did you get? (e.g. black screen on the Echo Show, "camera not responding".)
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Add-on Logs
      description: From the add-on's Logs tab. Redact passwords/domains/tokens.
      render: shell
  - type: textarea
    id: validate
    attributes:
      label: Validate streams / Public URL check result
      description: What those tabs show for the affected camera (Source, Output, Internal, External).
